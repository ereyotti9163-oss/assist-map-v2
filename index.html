<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アシストマップ v2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: white; }
        #map { height: 100%; width: 100%; }
        
        /* 検索バー：少しだけ右に寄せて被りを最小限に */
        .search-container {
            position: absolute;
            top: 10px;
            left: 45px; 
            right: 10px;
            z-index: 1000;
            display: flex;
            gap: 5px;
        }
        #search-input {
            flex-grow: 1;
            padding: 8px;
            border-radius: 5px;
            border: 2px solid #FFD700;
            font-size: 16px;
        }
        #search-button {
            padding: 8px 12px;
            background: #FFD700;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
        }
        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #222;
            border: 3px solid #FFD700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn img { width: 30px; height: 30px; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="地名・駅名で検索">
        <button id="search-button">検索</button>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div class="btn" onclick="toggleFollow()">
            <img src="https://cdn-icons-png.flaticon.com/512/9140/9140027.png" alt="追従">
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://rawcdn.githack.com/Fenichel/Leaflet.RotatedMarker/ab67571d87e2b0222f7e0344d49826372d68969f/leaflet.rotatedMarker.js"></script>
    <script src="https://rawcdn.githack.com/w8r/Leaflet.rotate/ecacb1a415442801e0506e75344d2d6ac65471d2/dist/leaflet-rotate-src.js"></script>

    <script>
        // --- script.js の中身 ---

        // 初期設定：八幡市男山弓岡付近をデフォルト表示
        // 回転機能を有効化する（L.rotate-map.jsを使用）
        const map = L.map('map', {
            center: [34.882, 135.698],
            zoom: 17,
            zoomControl: false,
            rotate: true // 【追加】地図回転を許可
        });

        // 衛星写真
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let userMarker;
        let isFollowing = false; // 追従＋ヘディングアップフラグ

        // 【追加】進行方向を示す「矢印」アイコン
        const arrowIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='color: #007AFF; font-size: 24px;'>▲</div>", // 青い▲
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        });

        // 位置情報の更新
        function onLocationFound(e) {
            // 現在地マーカーがなければ作成（矢印アイコン）
            if (!userMarker) {
                userMarker = L.marker(e.latlng, { 
                    icon: arrowIcon,
                    rotationAngle: 0, // 【追加】回転角の初期値
                    rotationOrigin: 'center center' // 中央を軸に回転
                }).addTo(map);
            } else {
                userMarker.setLatLng(e.latlng);
            }

            // 追従モードかつ進行方向が取得できれば、地図を回転
            if (isFollowing) {
                map.setView(e.latlng); // センター固定

                if (e.heading !== undefined && e.heading !== null) {
                    // 【追加】ヘディングアップ：地図を回転させる（360 - 進行方向）
                    map.setBearing(360 - e.heading);
                    
                    // 【追加】マーカー自体も進行方向に向ける
                    userMarker.setRotationAngle(e.heading); 
                }
            }
        }

        map.on('locationfound', onLocationFound);

        // GPS監視開始
        map.locate({ setView: false, watch: true, enableHighAccuracy: true });

        // 追従・ヘディングアップの切り替え
        function toggleFollow() {
            isFollowing = !isFollowing;
            const btn = document.querySelector('.btn');
            
            if (isFollowing) {
                btn.style.background = '#FFD700'; // ON: ゴールド
                if (userMarker) {
                    map.setView(userMarker.getLatLng(), 17);
                }
            } else {
                btn.style.background = '#222'; // OFF: 黒
                map.setBearing(0); // 【追加】ノースアップ（北が上）に戻す
                if(userMarker) userMarker.setRotationAngle(0); // 【追加】マーカーの回転をリセット
            }
        }

        // --- 検索機能 ---
        async function searchLocation() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    isFollowing = false; // 検索時は追従をオフにする
                    document.querySelector('.btn').style.background = '#222';
                    map.setBearing(0); // ノースアップに戻す
                    
                    const latlng = [data[0].lat, data[0].lon];
                    map.setView(latlng, 15);
                    L.marker(latlng).addTo(map).bindPopup(data[0].display_name).openPopup();
                } else {
                    alert("場所が見つかりませんでした。");
                }
            } catch (e) {
                console.error(e);
            }
        }

        document.getElementById('search-button').onclick = searchLocation;
        map.on('dragstart', () => {
            if (isFollowing) {
                isFollowing = false;
                document.querySelector('.btn').style.background = '#222';
            }
        });

    </script>
</body>
</html>
