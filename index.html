<style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #map { height: 100%; width: 100%; }
    
    /* 検索バーを少し下に下げる、またはボタンと被らないように調整 */
    .search-container {
        position: absolute;
        top: 10px;
        left: 50px; /* ＋ーボタンを避けるために左側に余白を作る */
        right: 10px;
        z-index: 1000;
        display: flex;
        gap: 5px;
    }
    #search-input {
        flex-grow: 1;
        padding: 10px;
        border-radius: 8px;
        border: 2px solid #FFD700;
        font-size: 16px;
        background: white;
    }
    #search-button {
        padding: 10px 15px;
        background: #FFD700;
        border: none;
        border-radius: 8px;
        font-weight: bold;
    }

    /* 拡大縮小ボタン（＋ー）自体の位置を少し調整したい場合はここ */
    .leaflet-top.leaflet-left {
        top: 5px; /* 少し上に詰める */
    }

    .controls {
        position: absolute;
        bottom: 30px;
        right: 20px;
        z-index: 1000;
    }
    .btn {
        width: 65px;
        height: 65px;
        border-radius: 50%;
        background: #222;
        border: 3px solid #FFD700;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .btn img { width: 35px; height: 35px; }
</style>
