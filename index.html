<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アシストマジック v2</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; font-family: sans-serif; }
        #map { height: 100%; width: 100%; z-index: 1; }

        /* 検索バーを画面上部に固定 */
        .leaflet-top.leaflet-right {
            left: 10px;
            right: 10px;
            top: 15px;
            width: auto;
        }
        .leaflet-control-geocoder {
            width: 100% !important;
            max-width: none !important;
            margin: 0 !important;
            border-radius: 12px !important;
            border: 2px solid #FFD700 !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
            display: flex;
            background: rgba(255, 255, 255, 0.95);
        }
        .leaflet-control-geocoder-form input {
            font-size: 16px !important;
            padding: 12px !important;
            border: none !important;
            outline: none !important;
        }
        .leaflet-control-geocoder-icon {
            background-color: #FFD700 !important;
            border-radius: 0 8px 8px 0 !important;
            width: 50px !important;
            height: auto !important;
        }

        /* 追従ボタン */
        .controls { position: absolute; bottom: 40px; right: 20px; z-index: 1001; }
        .btn { 
            width: 65px; height: 65px; border-radius: 50%; background: #222; 
            border: 3px solid #FFD700; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 6px 15px rgba(0,0,0,0.4); cursor: pointer; 
        }
        .btn img { width: 32px; height: 32px; filter: invert(1); }
        .btn.active { background: #FFD700; }
        .btn.active img { filter: invert(0); }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="controls">
        <div id="follow-btn" class="btn"><img src="https://cdn-icons-png.flaticon.com/512/9140/9140027.png"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://rawcdn.githack.com/Fenichel/Leaflet.RotatedMarker/ab67571d87e2b0222f7e0344d49826372d68969f/leaflet.rotatedMarker.js"></script>
    <script src="https://rawcdn.githack.com/w8r/Leaflet.rotate/ecacb1a415442801e0506e75344d2d6ac65471d2/dist/leaflet-rotate-src.js"></script>

    <script>
        const map = L.map('map', { center: [34.882, 135.698], zoom: 16, zoomControl: false, rotate: true });
        
        L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', { 
            maxZoom: 20,
            attribution: '© CyclOSM' 
        }).addTo(map);

        // 検索窓の組み込み
        const geocoder = L.Control.geocoder({
            defaultMarkGeocode: false,
            placeholder: "地名・駅名を検索...",
            errorMessage: "見つかりませんでした"
        }).on('markgeocode', function(e) {
            stopFollow();
            const latlng = e.geocode.center;
            map.setView(latlng, 15);
            L.marker(latlng).addTo(map).bindPopup(e.geocode.name).openPopup();
        }).addTo(map);

        let userMarker, isFollowing = false;
        const arrowIcon = L.divIcon({ 
            className: 'user-arrow', 
            html: "<div style='color: #007AFF; font-size: 36px; font-weight: bold; text-shadow: 0 0 5px white;'>▲</div>", 
            iconSize: [40, 40], iconAnchor: [20, 20] 
        });

        map.on('locationfound', (e) => {
            if (!userMarker) { userMarker = L.marker(e.latlng, { icon: arrowIcon }).addTo(map); }
            else { userMarker.setLatLng(e.latlng); }
            if (isFollowing) {
                map.setView(e.latlng);
                if (e.heading !== null) { 
                    map.setBearing(360 - e.heading); 
                    userMarker.setRotationAngle(e.heading); 
                }
            }
        });
        map.locate({ watch: true, enableHighAccuracy: true });

        const followBtn = document.getElementById('follow-btn');
        followBtn.onclick = () => {
            isFollowing = !isFollowing;
            followBtn.classList.toggle('active', isFollowing);
            if (!isFollowing) map.setBearing(0);
        };

        function stopFollow() {
            isFollowing = false;
            followBtn.classList.remove('active');
            map.setBearing(0);
        }

        map.on('dragstart', stopFollow);
    </script>
</body>
</html>
