<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アシストマジック v2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; font-family: sans-serif; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        /* 検索ボックス：幅を60%に制限し、中央寄せ */
        .search-container {
            position: absolute; top: 15px; left: 20%; right: 20%; z-index: 1000;
            display: flex; gap: 4px; background: rgba(255, 255, 255, 0.9);
            padding: 5px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border: 1px solid #FFD700;
        }
        #search-input { 
            flex-grow: 1; padding: 6px; border-radius: 4px; border: none; 
            font-size: 14px; outline: none; width: 10px; /* 最小幅を抑える */
        }
        #search-button { 
            padding: 6px 10px; background: #FFD700; border: none; 
            border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; 
            white-space: nowrap;
        }

        /* 現在地追従ボタン */
        .controls { position: absolute; bottom: 40px; right: 20px; z-index: 1000; }
        .btn { 
            width: 60px; height: 60px; border-radius: 50%; background: #222; 
            border: 3px solid #FFD700; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 6px 15px rgba(0,0,0,0.4); cursor: pointer;
            font-size: 28px;
        }
        .btn.active { background: #FFD700; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="検索...">
        <button id="search-button">検索</button>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div id="follow-btn" class="btn">🎯</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { center: [34.882, 135.698], zoom: 16, zoomControl: false });

        L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {
            maxZoom: 20, attribution: '© CyclOSM'
        }).addTo(map);

        let userMarker, isFollowing = false;

        map.on('locationfound', (e) => {
            if (!userMarker) {
                userMarker = L.circleMarker(e.latlng, {
                    radius: 9, color: '#FFFFFF', weight: 3, fillOpacity: 1, fillColor: '#007AFF'
                }).addTo(map);
            } else {
                userMarker.setLatLng(e.latlng);
            }
            if (isFollowing) { map.setView(e.latlng, 17); }
        });

        map.locate({ watch: true, enableHighAccuracy: true });

        const followBtn = document.getElementById('follow-btn');
        followBtn.onclick = () => {
            isFollowing = !isFollowing;
            followBtn.classList.toggle('active', isFollowing);
            if (isFollowing && userMarker) { map.setView(userMarker.getLatLng(), 17); }
        };

        map.on('dragstart', () => {
            isFollowing = false;
            followBtn.classList.remove('active');
        });

        window.handleSearchResponse = function(data) {
            if (data && data.length > 0) {
                isFollowing = false;
                followBtn.classList.remove('active');
                const latlng = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                map.setView(latlng, 15);
                L.marker(latlng).addTo(map).bindPopup(data[0].display_name).openPopup();
                document.getElementById('search-input').blur();
            } else {
                alert("見つかりませんでした。");
            }
            const oldScript = document.getElementById('search-script');
            if (oldScript) oldScript.remove();
        };

        function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;
            const script = document.createElement('script');
            script.id = 'search-script';
            script.src = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&json_callback=handleSearchResponse`;
            document.body.appendChild(script);
        }

        document.getElementById('search-button').onclick = performSearch;
        document.getElementById('search-input').onkeypress = (e) => { if (e.key === 'Enter') performSearch(); };
    </script>
</body>
</html>
