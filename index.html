<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アシストマップ v2 (Solid Cycle Line)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: white; }
        #map { height: 100%; width: 100%; }
        
        .search-container {
            position: absolute;
            top: 10px;
            left: 45px; 
            right: 10px;
            z-index: 1000;
            display: flex;
            gap: 5px;
        }
        #search-input {
            flex-grow: 1;
            padding: 8px;
            border-radius: 5px;
            border: 2px solid #FFD700;
            font-size: 16px;
        }
        #search-button {
            padding: 8px 12px;
            background: #FFD700;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
        }
        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #222;
            border: 3px solid #FFD700;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn img { width: 30px; height: 30px; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="地名・駅名で検索">
        <button id="search-button">検索</button>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div class="btn" onclick="toggleFollow()">
            <img src="https://cdn-icons-png.flaticon.com/512/9140/9140027.png" alt="追従">
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://rawcdn.githack.com/Fenichel/Leaflet.RotatedMarker/ab67571d87e2b0222f7e0344d49826372d68969f/leaflet.rotatedMarker.js"></script>
    <script src="https://rawcdn.githack.com/w8r/Leaflet.rotate/ecacb1a415442801e0506e75344d2d6ac65471d2/dist/leaflet-rotate-src.js"></script>

    <script>
        // 初期設定：八幡市付近
        const map = L.map('map', {
            center: [34.882, 135.698],
            zoom: 16,
            zoomControl: false,
            rotate: true 
        });

        // 【修正】サイクリングロードが「実線」で表示されるタイルレイヤーを採用
        // CyclOSMは自転車道が非常に見やすく、実線で強調されます
        L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {
            maxZoom: 20,
            attribution: '© CyclOSM | Map data © OpenStreetMap'
        }).addTo(map);

        let userMarker;
        let isFollowing = false;

        const arrowIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='color: #007AFF; font-size: 32px; font-weight: bold; text-shadow: 0 0 4px white;'>▲</div>",
            iconSize: [32, 32],
            iconAnchor: [16, 16]
        });

        function onLocationFound(e) {
            if (!userMarker) {
                userMarker = L.marker(e.latlng, { 
                    icon: arrowIcon,
                    rotationAngle: 0,
                    rotationOrigin: 'center center'
                }).addTo(map);
            } else {
                userMarker.setLatLng(e.latlng);
            }

            if (isFollowing) {
                map.setView(e.latlng);
                if (e.heading !== undefined && e.heading !== null) {
                    map.setBearing(360 - e.heading);
                    userMarker.setRotationAngle(e.heading);
                }
            }
        }

        map.on('locationfound', onLocationFound);
        map.locate({ setView: false, watch: true, enableHighAccuracy: true });

        function toggleFollow() {
            isFollowing = !isFollowing;
            const btn = document.querySelector('.btn');
            if (isFollowing) {
                btn.style.background = '#FFD700'; 
                if (userMarker) map.setView(userMarker.getLatLng(), 17);
            } else {
                btn.style.background = '#222';
                map.setBearing(0);
                if(userMarker) userMarker.setRotationAngle(0);
            }
        }

        async function searchLocation() {
            const query = document.getElementById('search-input').value;
            if (!query) return;
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if (data && data.length > 0) {
                    isFollowing = false;
                    document.querySelector('.btn').style.background = '#222';
                    map.setBearing(0);
                    const latlng = [data[0].lat, data[0].lon];
                    map.setView(latlng, 15);
                    L.marker(latlng).addTo(map).bindPopup(data[0].display_name).openPopup();
                }
            } catch (e) { console.error(e); }
        }

        document.getElementById('search-button').onclick = searchLocation;
        map.on('dragstart', () => {
            if (isFollowing) {
                isFollowing = false;
                document.querySelector('.btn').style.background = '#222';
            }
        });
    </script>
</body>
</html>
